<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>j-lawyer</title>
  <!-- Deployed as standalone WAR under this context path (design.md Decision 2a). -->
  <base href="/j-lawyer-web/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!--
    CSP baseline (design.md Decision 2c): no remote code at runtime, same-origin only.
    This <meta> is a fallback; the AUTHORITATIVE CSP + security headers (incl.
    frame-ancestors, X-Content-Type-Options, Referrer-Policy) are set as response
    headers at the WildFly/Undertow layer — see ../SUPPLY-CHAIN.md and web.xml notes.
    style-src allows 'unsafe-inline' for Angular component styles in this baseline;
    harden to nonce-based (ngCspNonce) in the server header.

    NOTE: production build sets optimization.styles.inlineCritical=false (angular.json).
    Beasties' critical-CSS deferral uses an inline onload handler on the stylesheet
    <link>, which "script-src 'self'" blocks — that left the full stylesheet inactive
    (media="print") and broke the light/dark theme switch. Disabling it keeps the CSP
    strict (no inline handlers) and loads the full stylesheet via a normal <link>.

    frame-src 'self' blob': allows the in-case document viewer to embed a PDF that was
    fetched with the Bearer token and turned into a client-side blob: URL. 'self' alone
    does NOT match blob:, and there is no frame-src fallback other than default-src.
    blob: URLs are same-origin and only creatable by our own code, so this is a narrow,
    deliberate allowance; object-src stays 'none'. IMPORTANT: if/when the AUTHORITATIVE
    CSP is added as an Undertow response header, it MUST also carry frame-src 'self'
    blob:, otherwise it overrides this <meta> and re-breaks embedded PDF preview.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">

  <meta name="color-scheme" content="light dark">
</head>
<body>
  <jl-root></jl-root>
</body>
</html>
